<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 - Page Not Found</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff512f, #dd2476, #7f00ff, #00c6ff);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .box {
            background: rgba(255, 255, 255, 0.2);
            padding: 50px;
            border-radius: 28px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            backdrop-filter: blur(12px);
            max-width: 650px;
        }

        h1 {
            font-size: 95px;
            margin: 0;
        }

        h2 {
            font-size: 32px;
            color: #ffe600;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
        }

        a {
            display: inline-block;
            margin-top: 25px;
            background: #ffcc00;
            color: #222;
            padding: 14px 30px;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        a:hover {
            background: white;
            transform: scale(1.08);
        }

        .emoji {
            font-size: 65px;
        }
    </style>
</head>

<body>
    <div class="box">
        <div class="emoji">😵‍💫☁️</div>
        <h1>404</h1>
        <h2>Oops! Page Lost in the Cloud</h2>

        <p>
            The page you are looking for does not exist.
            Maybe it flew away inside Azure Storage!
        </p>

        <a href="index.html">Go Back Home 🚀</a>
    </div>
</body>
</html>
